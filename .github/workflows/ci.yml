name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest + migrations)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        # 測試用 SQLite in-memory 並停用 Redis，無需外部服務
        env:
          REDIS_URL: ""
          DATABASE_URL: "sqlite:///:memory:"
        run: python -m pytest tests/ -v
      - name: Verify migrations apply cleanly
        # 確保 Alembic migration 能在全新 DB 套用成功
        env:
          FLASK_APP: run.py
          REDIS_URL: ""
          DATABASE_URL: "sqlite:////tmp/ci_migrate.db"
        run: flask db upgrade

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: predictcup-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: predictcup-frontend:ci
          build-args: NEXT_PUBLIC_API_BASE=/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
