name: Deploy (Railway + Vercel)

# 推到 main 時部署：後端 → Railway、前端 → Vercel。
# 需先在 repo 設定：
#   Secrets:   RAILWAY_TOKEN（Railway 專案 token）、VERCEL_DEPLOY_HOOK（選用）
#   Variables: RAILWAY_BACKEND_SERVICE（Railway 後端服務名稱）
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Backend → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy backend service
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # 以 backend/ 為 build context（含 Dockerfile）上傳部署。
          # Railway 啟動容器時 entrypoint.sh 會自動跑 flask db upgrade。
          railway up --service "${{ vars.RAILWAY_BACKEND_SERVICE }}" --detach

  deploy-frontend:
    name: Frontend → Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            echo "觸發 Vercel Deploy Hook…"
            curl -fsSL -X POST "$HOOK"
          else
            echo "未設定 VERCEL_DEPLOY_HOOK。"
            echo "建議改用 Vercel 的 GitHub 整合（Import 專案後自動部署）——"
            echo "那是最省事的前端部署方式，不需要此 workflow。"
          fi
